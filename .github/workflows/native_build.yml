name: Native Multi-Platform Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- ANDROID DERLEME İŞLEMİ ---
  android-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: android

    - name: Build Android APK
      run: ./gradlew assembleDebug
      working-directory: android

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: BusineesCard-Android-Debug
        path: android/app/build/outputs/apk/debug/app-debug.apk

  # --- IOS (SWIFT) DERLEME İŞLEMİ ---
  ios-build:
    runs-on: macos-latest # Swift derlemek için macOS sunucusu gerekir
    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode Version
      run: sudo xcode-select -s /Applications/Xcode_15.2.app

    - name: Build iOS App (SwiftUI)
      run: |
        cd ios
        xcodebuild -workspace Runner.xcworkspace \
                   -scheme Runner \
                   -sdk iphonesimulator \
                   -destination 'platform=iOS Simulator,name=iPhone 15' \
                   build CODE_SIGNING_ALLOWED=NO
