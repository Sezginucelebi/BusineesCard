name: busineescard
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  sqflite: ^2.3.0
  path: ^1.9.0
  qr_flutter: ^4.1.0
  share_plus: ^7.2.2
  uuid: ^4.3.3
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  google_sign_in: ^6.2.1
  firebase_core: ^3.11.0    # EKSİK OLAN BU
  firebase_auth: ^5.5.0    # EKSİK OLAN BU

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/